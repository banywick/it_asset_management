{% extends "admin/change_list.html" %}

{% block object-tools %}
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
        <div style="display: flex; gap: 10px;">
            {% if download_url %}
            <a href="{{ download_url }}" class="button" style="background: #27ae60; padding: 8px 15px; color: white; text-decoration: none; border-radius: 4px;">
                📥 Скачать шаблон Excel
            </a>
            {% endif %}
            {% if import_url %}
            <a href="{{ import_url }}" class="button" style="background: #79aec8; padding: 8px 15px; color: white; text-decoration: none; border-radius: 4px;">
                📤 ИМПОРТ EXCEL
            </a>
            {% endif %}
        </div>
        <div>
            {{ block.super }}
        </div>
    </div>
{% endblock %}
