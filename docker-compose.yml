version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: it_asset_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: it_asset_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - it_asset_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: it_asset_backend
    environment:
      POSTGRES_DB: it_asset_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DEBUG: "True"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - it_asset_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: it_asset_frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - it_asset_network

volumes:
  postgres_data:

networks:
  it_asset_network:
    driver: bridge