version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: it_asset_db_prod
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - it_asset_network_prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: it_asset_backend_prod
    env_file:
      - .env
    volumes:
      - media_volume_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - it_asset_network_prod
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: it_asset_frontend_prod
    networks:
      - it_asset_network_prod
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: it_asset_nginx_prod
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - media_volume_prod:/media
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - it_asset_network_prod
    restart: unless-stopped

volumes:
  postgres_data_prod:
  media_volume_prod:

networks:
  it_asset_network_prod:
    driver: bridge